name: Bug Report
description: 报告一个问题
title: "[Bug] "
labels:
  - bug
body:
  - type: input
    id: app_version
    attributes:
      label: App 版本
      placeholder: 例如：v1.2.3
    validations:
      required: true

  - type: input
    id: android_version
    attributes:
      label: 安卓版本
      placeholder: 例如：Android 9 / Android 11

  - type: input
    id: tv_brand_model
    attributes:
      label: 电视型号
      placeholder: 例如：小米 TV A55、Sony KD-55X85K

  - type: textarea
    id: issue_details
    attributes:
      label: 问题详情
      placeholder: 请描述问题现象、复现步骤等
